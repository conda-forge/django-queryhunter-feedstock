{% set name = "django-queryhunter" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/django_queryhunter-{{ version }}.tar.gz
  sha256: 3dcae81971c8864382897cd9303472517baa37181edf55f5675e812f38fdf66a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry >=1.1.13
    - pip
  run:
    - python >={{ python_min }}
    - django >=3.2

test:
  imports:
    - queryhunter
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/PaulGilmartin/django-queryhunter
  summary: Map your Django application code to the SQL queries it produces.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
